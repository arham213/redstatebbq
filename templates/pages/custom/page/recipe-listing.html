{{#partial "page"}}
<script>
    window.stencilStorefrontToken = '{{settings.storefront_api.token}}';
</script>
<div class="nx-recipe-page">

    <!-- ================= RECIPE HERO ================= -->
    <section class="recipe-hero-listing">
        <h2 class="display section-title">Recipes For You</h2>
        <div class="swiper nx-recipe-hero-swiper" style="width: 100%;">
            <div class="swiper-wrapper hero-cards" id="nx-recipe-hero-container">
                <div class="swiper-slide hero-card skeleton-hero">
                    <div class="skeleton-img"></div>
                    <div class="hero-overlay" style="background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);">
                        <div style="flex: 1; padding-top: 10px;">
                            <div class="skeleton-text" style="width: 70%; height: 32px; background: rgba(255,255,255,0.4); margin: 0 auto; border-radius: 8px;"></div>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide hero-card skeleton-hero">
                    <div class="skeleton-img"></div>
                    <div class="hero-overlay" style="background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);">
                        <div style="flex: 1; padding-top: 10px;">
                            <div class="skeleton-text" style="width: 60%; height: 32px; background: rgba(255,255,255,0.4); margin: 0 auto; border-radius: 8px;"></div>
                        </div>
                    </div>
                </div>
                <div class="swiper-slide hero-card skeleton-hero">
                    <div class="skeleton-img"></div>
                    <div class="hero-overlay" style="background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);">
                        <div style="flex: 1; padding-top: 10px;">
                            <div class="skeleton-text" style="width: 80%; height: 32px; background: rgba(255,255,255,0.4); margin: 0 auto; border-radius: 8px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ================= CATEGORIES ================= -->
    <section class="categories">

        <div class="container">

            <div class="cat-head">
                <h2 class="display section-title">Our Categories</h2>
                <div class="tabs" id="nx-recipe-tabs-container">
                    <!-- Skeleton Tabs -->
                    <div class="tab skeleton-tab" style="width: 80px;"></div>
                    <div class="tab skeleton-tab" style="width: 120px;"></div>
                    <div class="tab skeleton-tab" style="width: 100px;"></div>
                </div>
            </div>

            <div class="cat-cards">
                <div class="card-row" id="nx-recipe-grid-container">
                    <!-- Skeleton Grid -->
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 80%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 40%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 30%;"></div>
                        </div>
                    </article>
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 70%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 50%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 40%;"></div>
                        </div>
                    </article>
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 85%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 45%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 35%;"></div>
                        </div>
                    </article>
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 75%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 40%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 25%;"></div>
                        </div>
                    </article>
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 65%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 45%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 35%;"></div>
                        </div>
                    </article>
                    <article class="rcard skeleton-card">
                        <div class="rcard-img">
                            <div class="skeleton-img"></div>
                        </div>
                        <div class="rcard-body">
                            <div class="skeleton-text" style="height: 24px; width: 90%; margin-bottom: 24px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 50%; margin-bottom: 12px;"></div>
                            <div class="skeleton-text" style="height: 16px; width: 40%;"></div>
                        </div>
                    </article>
                </div>

                <div class="load-more-container" style="text-align: center; margin-top: 40px; display: none;"
                    id="nx-recipe-load-more-wrapper">
                    <button class="btn-outline" id="nx-recipe-load-more">Load More</button>
                </div>
            </div>

        </div>
    </section>

    <!-- ================= TESTIMONIAL ================= -->
    {{> components/custom/nexyl/common/testimonial-slider title="Recipes loved By All"}}

</div>
{{/partial}}
{{> layout/base}}
