<div class="nx-drop-bar">
    <div class="nx-drop-bar-inner">
        <p>
            <span class="nx-accent">★ NEW LIMITED DROP</span>
            <span> · The 1776 Independence Blend only 1,776 bottles ever made </span>
        </p>
        <p class="nx-countdown" id="nx-drop-bar-timer">-- d • -- hrs • -- min • -- sec</p>
    </div>
</div>

<script>
    (function () {
        // Countdown to July 4, 2026 midnight EDT (UTC-4) — last day of the 1776 Independence Blend
        const target = new Date('2026-07-04T00:00:00-04:00').getTime();
        const $timer = document.getElementById('nx-drop-bar-timer');

        function pad(n) { return String(n).padStart(2, '0'); }

        function tick() {
            let diff = target - Date.now();
            if (diff <= 0) {
                diff = 0;
                clearInterval(intervalId);
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            if ($timer) {
                $timer.textContent = `${days} d • ${pad(hours)} hrs • ${pad(mins)} min • ${pad(secs)} sec`;
            }
        }

        tick();
        const intervalId = setInterval(tick, 1000);
    })();
</script>
